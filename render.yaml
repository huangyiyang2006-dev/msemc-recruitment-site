services:
  - type: web
    name: msemc-recruitment
    runtime: python
    plan: starter
    buildCommand: python -m compileall .
    startCommand: python server.py
    healthCheckPath: /api/health
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
    disk:
      name: msemc-signup-data
      mountPath: /var/data
      sizeGB: 1
