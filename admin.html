<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f5f6f8">
  <title>报名管理端 | 材料科学与工程学院大学生传媒中心</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">
  <main class="admin-shell">
    <section class="admin-hero">
      <div>
        <p class="eyebrow">LOCAL ADMIN VIEW</p>
        <h1>报名信息汇总</h1>
        <p class="admin-hero__lead">这里会展示所有通过网页提交到你这台电脑的数据。管理页仅允许在本机通过 `localhost` 打开。</p>
      </div>
      <div class="admin-actions">
        <button class="button button--secondary" type="button" id="refreshButton">刷新数据</button>
        <a class="button button--primary" href="/api/admin/signups.csv">导出 CSV</a>
      </div>
    </section>

    <section class="admin-stats" id="adminStats">
      <article class="stat-card">
        <strong id="totalCount">0</strong>
        <span>总报名人数</span>
        <p>已汇总到本机数据库的有效报名记录。</p>
      </article>
      <article class="stat-card">
        <strong id="todayCount">0</strong>
        <span>今日新增</span>
        <p>按本机当前日期统计的新提交数量。</p>
      </article>
      <article class="stat-card">
        <strong id="topChoice">-</strong>
        <span>最热第一志愿</span>
        <p>当前第一志愿报名人数最多的部门。</p>
      </article>
      <article class="stat-card">
        <strong id="latestTime">-</strong>
        <span>最新提交时间</span>
        <p>最近一条报名记录进入本机的时间。</p>
      </article>
    </section>

    <section class="admin-toolbar">
      <label class="admin-search">
        <span>搜索报名信息</span>
        <input type="search" id="searchInput" placeholder="可搜索姓名、班级、学号、专业、志愿、技能、奖项">
      </label>
      <p class="admin-toolbar__meta" id="resultMeta">正在加载数据...</p>
    </section>

    <section class="admin-table-panel">
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>提交时间</th>
              <th>姓名</th>
              <th>班级</th>
              <th>学号</th>
              <th>专业</th>
              <th>第一志愿</th>
              <th>第二志愿</th>
              <th>第三志愿</th>
              <th>技能</th>
              <th>奖项</th>
              <th>个人简历</th>
              <th>补充说明</th>
            </tr>
          </thead>
          <tbody id="signupTableBody"></tbody>
        </table>
      </div>
      <div class="admin-empty" id="emptyState" hidden>
        <h2>还没有报名记录</h2>
        <p>当有人通过报名页提交信息后，数据会自动出现在这里。</p>
      </div>
    </section>
  </main>

  <div class="toast" id="adminToast" role="status" aria-live="polite">
    <p id="adminToastMessage">数据已刷新。</p>
  </div>

  <script src="admin.js"></script>
</body>
</html>
